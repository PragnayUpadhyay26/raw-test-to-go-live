<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Event Test Page</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background:#EAAD00;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.live-status{
    color:red;
    font-weight:bold;
    margin-bottom:20px;
    font-size:18px;
}

.video-container{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
}

.video-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

.info{
    margin-top:30px;
    font-size:18px;
}

</style>

</head>

<body>

<header>
Live Event Test
</header>

<div class="container">

<div class="live-status">
🔴 LIVE NOW
</div>

<div class="video-container">

<!-- Replace VIDEO_ID with your live stream ID -->

<iframe 
src="https://www.youtube.com/embed/VIDEO_ID?autoplay=1&mute=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<div class="info">
Testing live video functionality before deploying to the main website.
</div>

</div>

</body>
</html>
